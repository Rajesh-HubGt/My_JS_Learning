<html>

<head>

<body>

    <div class="dark_background text-center">
        <div>
            <img src="https://d2clawv67efefq.cloudfront.net/ccbp-dynamic-webapps/bulb-go-on-img.png" class="bulb-image" id="bulbImage" />
