 <!DOCTYPE html>
<html>

<head>
    <title>Color Picker</title>
    <link rel="stylesheet" href="Color.css">
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css" integrity="sha384-JcKb8q3iqJ61gNV9KGb8thSsNjpSL0n8PARn9HuZOnIxN0hoP+VmmDGMN5t9UJ0Z" crossorigin="anonymous" />
    <script src="https://code.jquery.com/jquery-3.5.1.slim.min.js" integrity="sha384-DfXdz2htPH0lsSSs5nCTpuj/zy4C+OGpamoFVy38MVBnE+IbbVYUew+OrCXaRkfj" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/popper.js@1.16.1/dist/umd/popper.min.js" integrity="sha384-9/reFTGAW83EW2RDu2S0VKaIzap3H66lZH81PoYlFhbGU+6BZp6G7niu735Sk7lN" crossorigin="anonymous"></script>
    <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js" integrity="sha384-B4gt1jrGC7Jh4AgTPSdUtOBvfO8shuf57BaghqFfPlYxofvL8/KUEfYiJOMMV+rV" crossorigin="anonymous"></script>
</head>

<body>
    <div class="bg_container text-center d-flex flex-column justify-content-center" id="bgContainer">
        <h1 class="color-heading ">Color Picker</h1>
        <div>
            <button class="color-button" style="Background-color:#e0e0e0;" id="button1" onclick="changeBgcolorContainerGray()">#e0e0e0</button>
            <button class="color-button" style="Background-color:#6fcf97;" id="button2" onclick="changeBgcolorContainerGreen()">#6fcf97</button>
            <button class="color-button" style="Background-color:#56ccf2;" id="button3" onclick="changeBgcolorContainerBlue()">#56ccf2</button>
            <button class="color-button" style="Background-color:#bb6bd9;" id="button4" onclick="changeBgcolorContainerPurple()">#bb6bd9</button>
        </div>
        <p class="color-background">Background Color : <span class="color-hex-code" id="colorHexCode">#fffff</span></p>
        <p class="color-content">Try clicking on one of the colors above to change the background color of this page!</p>
    </div>
    <script src="Color.js"></script>
</body>

</html>
